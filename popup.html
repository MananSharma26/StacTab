<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { 
      --bg: #F5F3FF; 
      --surface: #FFFFFF; 
      --surface-hover: #FBFBFF;
      --border: #E5E0FF; 
      --text-main: #1F1A33; 
      --text-sub: #6B628D;
      --accent: #8B5CF6; 
      --danger: #EF4444; 
      --radius-large: 12px; 
    }
    body {
      width: 260px; margin: 0; padding: 16px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text-main); user-select: none; -webkit-font-smoothing: antialiased;
      position: relative; overflow: hidden;
    }
    .profile-card { background: var(--surface); border-radius: var(--radius-large); padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--border); margin-bottom: 10px; }
    .profile-card-row { display: flex; align-items: center; justify-content: space-between; }
    .threshold-row { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 8px; }
    .threshold-label { font-size: 11px; font-weight: 500; color: var(--text-sub); }
    .thresh-picker { display: flex; gap: 3px; background: var(--bg); border-radius: 8px; padding: 2px; }
    .thresh-btn { width: 30px; height: 22px; background: transparent; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-sub); cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif; }
    .thresh-btn:hover { background: var(--surface); color: var(--text-main); }
    .thresh-btn.active { background: var(--accent); color: #fff; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 24px; height: 24px; object-fit: contain; } 
    .brand-text { display: flex; align-items: baseline; gap: 6px; }
    .brand-name { font-size: 17px; font-weight: 700; color: var(--text-main); letter-spacing: -0.3px; }
    .brand-status { font-size: 11px; color: var(--text-sub); font-weight: 500; }
    .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #E5E0FF; transition: .3s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(14px); }
    .search-container { position: relative; margin-bottom: 16px; }
    .search-input { width: 100%; box-sizing: border-box; padding: 10px 12px 10px 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-family: 'Inter'; font-size: 13px; color: var(--text-main); outline: none; transition: 0.2s; }
    .search-input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 12px; top: 10px; font-size: 14px; color: var(--text-sub); }
    #search-results { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 4px; z-index: 100; max-height: 200px; overflow-y: auto; }
    .search-item { padding: 10px 12px; border-bottom: 1px solid #F5F3FF; cursor: pointer; display: flex; flex-direction: column; }
    .search-item:last-child { border-bottom: none; }
    .search-item.active, .search-item:hover { background: #F5F3FF; }
    .search-item-title { font-size: 12px; font-weight: 500; color: var(--text-main); }
    .search-item-url { font-size: 10px; color: var(--text-sub); }
    .hero-btn {
      width: 100%; padding: 9px;
      background: var(--accent);
      color: #FFFFFF;
      border: none; border-radius: var(--radius-large);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .hero-btn:hover { opacity: 0.9; }
    .tool-bar { display: flex; background: var(--surface); border-radius: var(--radius-large); padding: 3px; border: 1px solid var(--border); margin-bottom: 10px; gap: 2px; }
    .tool-btn { flex: 1; padding: 6px 0; background: transparent; border: none; border-radius: 8px; font-size: 11px; font-weight: 500; color: var(--text-sub); cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .tool-btn:hover { background: var(--bg); }
    .tool-icon { font-size: 16px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; padding: 0 4px; }
    .section-title { font-size: 12px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
    .dash-link { font-size: 12px; font-weight: 500; color: var(--accent); text-decoration: none; cursor: pointer; transition: 0.2s; background: rgba(139, 92, 246, 0.05); padding: 4px 8px; border-radius: 6px;}
    .dash-link:hover { background: rgba(139, 92, 246, 0.1); }
    .archive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .arc-btn { background: var(--surface); border: 1px solid var(--border); padding: 8px 8px; border-radius: var(--radius-large); font-size: 11px; font-weight: 500; color: var(--text-main); cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .arc-btn:hover { border-color: var(--accent); background: var(--surface-hover); }
    .arc-icon { color: var(--text-sub); font-size: 17px; }
    #session-modal { display: none; position: absolute; inset: 0; background: var(--surface); border-radius: var(--radius-large); padding: 20px; z-index: 200; flex-direction: column; gap: 12px; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .session-modal-title { font-size: 13px; font-weight: 600; color: var(--text-main); }
    .session-modal-hint { font-size: 11px; color: var(--text-sub); margin-top: -6px; }
    .session-modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-cancel { flex: 1; padding: 9px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-large); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-sub); cursor: pointer; transition: 0.2s; }
    .btn-cancel:hover { background: var(--bg); }
    #groups-section { display: none; margin-top: 8px; }
    .groups-list { display: flex; flex-direction: column; gap: 4px; }
    .arc-group-btn { background: var(--surface); border: 1px solid var(--border); padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 500; color: var(--text-main); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; font-family: 'Inter', sans-serif; }
    .arc-group-btn:hover { border-color: var(--accent); background: var(--surface-hover); }
    .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .group-row { display: flex; gap: 4px; align-items: center; }
    .group-row .arc-group-btn { flex: 1; }
    .split-group-btn { background: var(--surface); border: 1px solid var(--border); padding: 6px 8px; border-radius: 8px; font-size: 10px; font-weight: 500; color: var(--text-sub); cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif; white-space: nowrap; }
    .split-group-btn:hover { border-color: var(--accent); color: var(--text-main); background: var(--surface-hover); }
    .toast { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 11px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 300; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="profile-card">
    <div class="profile-card-row">
      <div class="brand">
        <img src="icon_v2.png" alt="Logo" id="brand-logo">
        <div class="brand-text"><span class="brand-name">StacTab</span><span class="brand-status">Auto-Pilot</span></div>
      </div>
      <label class="switch" title="Toggle Auto-Grouping"><input type="checkbox" id="toggle-auto" checked><span class="slider"></span></label>
    </div>
    <div class="threshold-row">
      <span class="threshold-label">Group at</span>
      <div class="thresh-picker">
        <button class="thresh-btn" data-val="2">2</button>
        <button class="thresh-btn" data-val="3">3</button>
        <button class="thresh-btn" data-val="4">4</button>
        <button class="thresh-btn" data-val="5">5</button>
      </div>
      <span class="threshold-label">+ tabs</span>
    </div>
  </div>
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" id="live-search" class="search-input" placeholder="Search tabs... (Alt+S)">
    <div id="search-results"></div>
  </div>
  <button id="btn-sort" class="hero-btn"><span style="font-size: 16px;">✦</span> Organize tabs into groups <span style="opacity:.5;font-size:.72em;font-weight:500;margin-left:4px;">Alt+G</span></button>
  <div class="tool-bar">
    <button id="btn-sleep" class="tool-btn" title="Suspend all background tabs to free up memory. Click the tab to wake it."><span class="tool-icon">☾</span><span>Sleep tabs</span></button>
    <button id="btn-dupes" class="tool-btn" style="color: var(--danger);" title="Close duplicate tabs — keeps the first copy of any URL open."><span class="tool-icon">⦻</span><span>Dedupe tabs</span></button>
    <button id="btn-merge" class="tool-btn" title="Pull all tabs from other Chrome windows into this one."><span class="tool-icon">⊞</span><span>Merge windows</span></button>
  </div>
  <div class="section-header">
    <span class="section-title">Archive tabs</span>
    <span id="btn-dashboard" class="dash-link">View Vault ↗</span>
  </div>
  <div class="archive-grid">
    <button id="arc-current" class="arc-btn" title="Save this tab to your Vault and close it."><span class="arc-icon">⊙</span> Current tab</button>
    <button id="arc-all" class="arc-btn" title="Save all open tabs as a named session in your Vault and close them."><span class="arc-icon">⟷</span> All tabs</button>
    <button id="arc-left" class="arc-btn" title="Save all tabs to the left of this one to your Vault and close them."><span class="arc-icon">⟵</span> Left tabs</button>
    <button id="arc-right" class="arc-btn" title="Save all tabs to the right of this one to your Vault and close them."><span class="arc-icon">⟶</span> Right tabs</button>
  </div>
  <div id="groups-section">
    <div class="section-header" style="margin-top:12px;margin-bottom:8px;">
      <span class="section-title">Tab groups</span>
    </div>
    <div id="groups-list" class="groups-list"></div>
  </div>
  <div id="session-modal">
    <div class="session-modal-title">Name this session</div>
    <div class="session-modal-hint">Optional — leave blank to use today's date</div>
    <input type="text" id="session-name-input" class="search-input" placeholder="e.g. Work, Research...">
    <div class="session-modal-actions">
      <button id="session-confirm" class="hero-btn" style="flex:1;margin:0;padding:9px;font-size:13px;">Archive</button>
      <button id="session-cancel" class="btn-cancel">Cancel</button>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
